// LoRa Basics Station station.conf for LPS8N Indoor LoRaWAN Gateway. Authored by @intelligent-farming/lorawan-gateway-catalog (AGPL-3.0-or-later; see NOTICE).
// Create these files on the gateway alongside station.conf:
//   tc.uri   -> {{TC_URI}}
//   tc.trust -> {{TRUST_CERT}}
// Point tc.uri at the ChirpStack Gateway Bridge Basics Station backend (commonly wss://<host>:3001).
{
  "radio_conf": {
    "lorawan_public": true,
    "clksrc": 0,
    "radio_0": { "enable": true, "type": "SX1250", "freq": {{RADIO_0_FREQ}}, "tx_enable": true },
    "radio_1": { "enable": true, "type": "SX1250", "freq": {{RADIO_1_FREQ}}, "tx_enable": false },
{{RADIO_BLOCK}}
  },
  "station_conf": {
    "routerid": "{{GATEWAY_EUI}}",
    "log_level": "INFO"
  }
}
